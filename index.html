<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Wayfairer Sailing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 80px;
        background-color: white;
        display: flex;
        align-items: center;
        padding: 0 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        z-index: 1000;
      }

      .topbar img {
        height: 70px;
        flex-shrink: 0;
      }

      #wind-display {
        display: flex;
        align-items: center; /* fixed */
        margin-left: 80px;
        font-size: 0.9rem;
        color: #333;
        white-space: nowrap;
      }

      #wind-arrow {
        width: 0;
        height: 0;
        border-left: 8px solid transparent;
        border-right: 8px solid transparent;
        border-bottom: 16px solid #333; /* arrow color */
        margin-right: 8px;
        transition: transform 0.3s ease-out;
        transform-origin: 50% 100%; /* rotate around the base of the arrow */
      }

      body {
        margin: 0;
        padding-top: 70px;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        color: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        background-image: url("images/Boat9.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .logo {
        position: absolute;
        top: 5px;
        left: 5px;
        width: 70px;
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 0.5rem;
      }

      p {
        font-size: 1.2rem;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <img src="images/wayfairer_logo1.png" class="logo" alt="Logo">

    <div id="wind-display">
      <div id="wind-arrow" aria-hidden="true"></div>
      <span id="wind-text">Loading wind...</span>
    </div>
    </div>
    <div>
      <h1>Wayfairer</h1>
      <p>Lets Go Sailing</p>
    </div>

    <script>
  let hasValidWind = false; // track if we've ever shown valid data

  async function fetchWind() {
    const windDisplay = document.getElementById("wind-display");
    const windText = document.getElementById("wind-text");
    const windArrow = document.getElementById("wind-arrow");

    try {
      const proxy = "https://api.allorigins.win/raw?url=";
      const target = "https://www.ndbc.noaa.gov/data/realtime2/CHII2.txt";
      const url = proxy + target;

      const response = await fetch(url);
      if (!response.ok) {
        throw new Error("Network error: " + response.status);
      }

      const text = await response.text();
      const lines = text.trim().split("\n");

      if (lines.length < 3) {
        if (!hasValidWind) {
          windText.innerText = "Wind data unavailable";
        }
        return;
      }

      const linesToCheck = lines.slice(2, 15);
      const firstValidLine = linesToCheck.find(line => {
        const parts = line.trim().split(/\s+/);
        return parts.length > 6 &&
               parts[5] !== "MM" &&
               parts[6] !== "MM";
      });

      if (!firstValidLine) {
        if (!hasValidWind) {
          windText.innerText = "Wind data unavailable";
        }
        return;
      }

      const parts = firstValidLine.trim().split(/\s+/);
      const windDir = parseFloat(parts[5]);
      const windSpeed = parts[6];

      if (isNaN(windDir) || windSpeed === "MM") {
        if (!hasValidWind) {
          windText.innerText = "Wind data unavailable";
        }
        return;
      }

      hasValidWind = true;
      windText.innerText = `Wind: ${windSpeed} kt @ ${windDir}°`;

      const arrowDegrees = (windDir + 180) % 360;
      if (windArrow) {
        windArrow.style.transform = `rotate(${arrowDegrees}deg)`;
      }
      
    } catch (e) {
      console.error("Error fetching wind:", e);
      if (!hasValidWind) {
        if (windText) {
          windText.innerText = "Wind data unavailable";
        } else {
          windDisplay.innerText = "Wind data unavailable";
        }
      }
    }
  }

  fetchWind();              
  setInterval(fetchWind, 60000); // update every 60s 
</script>
  </body>
</html>
